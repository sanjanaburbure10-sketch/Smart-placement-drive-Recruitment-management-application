{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – Placement Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0c2729,#302b63,#24243e);
}

.container{
    width:380px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    color:white;
    text-align:center;
}

h2{margin-bottom:5px;}
p{font-size:14px;color:#ccc;margin-bottom:20px;}

.toggle{
    display:flex;
    background:#ffffff15;
    border-radius:10px;
    margin-bottom:20px;
}

.toggle button{
    flex:1;
    padding:10px;
    border:none;
    background:none;
    color:#aaa;
    cursor:pointer;
}

.toggle .active{
    background:#6c63ff;
    color:white;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#ffffff10;
    color:white;
}

button.main{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#b322b3,#3dc5c5);
    color:white;
    cursor:pointer;
}

a{
    display:block;
    margin-top:15px;
    color:#c4b5fd;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
<h2>Placement Portal</h2>
<p>Welcome back! Please sign in</p>

<div class="toggle">
    <button id="studentBtn" class="active" onclick="setRole('student')">Student</button>
    <button id="adminBtn" onclick="setRole('admin')">Admin</button>
</div>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="main" onclick="login()">Sign In</button>

<a href="{% url 'signup' %}">Don't have an account? Sign Up</a>
</div>

<script>
let role = "student";

function setRole(r){
    role = r;
}

async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/api/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,password,role})
    });

    const data = await res.json();

    if(data.success){

        // ✅ STORE DATA
        localStorage.setItem("user_id", data.user_id);
        localStorage.setItem("user_name", data.name);
        localStorage.setItem("user_email", data.email);
        localStorage.setItem("user_role", data.role);

        // ✅ REDIRECT BASED ON ROLE
        if(data.role === "student"){
            window.location.href = "/student-dashboard/";
        }else{
            window.location.href = "/admin-dashboard/";
        }

    }else{
        alert(data.message);
    }
}
</script>

</body>
</html>
